<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DARKIFY UNCHAINED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        .spotify-gradient { background: linear-gradient(to bottom, #111, #000); }
        #main-scroll { height: calc(100vh - 150px); overflow-y: auto; scroll-behavior: smooth; }
        .song-card { background: #121212; transition: 0.2s; border-radius: 12px; padding: 10px; border: 1px solid #222; cursor: pointer; }
        .song-card:active { scale: 0.95; background: #333; }
        ::-webkit-scrollbar { width: 0px; }
        .glow-red { box-shadow: 0 0 20px rgba(220, 38, 38, 0.3); }
        .loading-text { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="h-screen flex flex-col">

    <main id="main-scroll" class="flex-1 spotify-gradient p-5">
        <header class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-black text-white italic tracking-tighter">DARKIFY <span class="text-red-600">ULTRA</span></h1>
                <div class="flex items-center gap-1">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
                    <p class="text-[10px] text-zinc-400 font-bold uppercase">Bypassing Encryption Protocol...</p>
                </div>
            </div>
            <div class="bg-red-600/20 p-2 rounded-xl border border-red-600/50"><i data-lucide="shield-off" class="w-5 h-5 text-red-600"></i></div>
        </header>

        <div class="relative mb-8">
            <i data-lucide="zap" class="absolute left-4 top-1/2 -translate-y-1/2 text-red-500 w-5 h-5"></i>
            <input type="text" id="search-input" onkeydown="if(event.key==='Enter') darkSearch(this.value)" placeholder="Nama Artis / Lagu + Enter ☠️" 
                   class="w-full bg-zinc-900/50 border border-zinc-800 text-white py-4 pl-12 pr-4 rounded-2xl font-bold outline-none focus:border-red-600 transition-all shadow-2xl">
        </div>

        <h2 id="section-title" class="text-lg font-black mb-4 flex items-center gap-2 text-zinc-300">LATEST BREACH 🌍</h2>
        <div id="song-grid" class="grid grid-cols-2 gap-4 pb-32">
            </div>
    </main>

    <div id="player-bar" class="fixed bottom-20 left-4 right-4 bg-zinc-900/90 backdrop-blur-xl border border-white/10 rounded-3xl p-3 flex items-center justify-between shadow-[0_20px_50px_rgba(0,0,0,1)] z-50 transform translate-y-48 transition-all duration-700">
        <div class="flex items-center gap-3 truncate max-w-[70%]">
            <img id="p-img" src="" class="w-14 h-14 rounded-2xl object-cover glow-red border border-white/5">
            <div class="truncate">
                <div id="p-title" class="text-sm font-black truncate text-white">READY TO PLAY</div>
                <div id="p-artist" class="text-[10px] text-red-500 truncate uppercase font-bold tracking-widest">Dark System Active</div>
            </div>
        </div>
        <button onclick="togglePlay()" class="bg-white p-3 rounded-full text-black hover:scale-110 active:scale-90 transition shadow-xl">
            <i id="p-icon" data-lucide="play" class="w-6 h-6 fill-current"></i>
        </button>
        <div class="absolute bottom-0 left-0 h-1 bg-red-600 rounded-full transition-all duration-300" id="p-progress" style="width: 0%"></div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/80 backdrop-blur-md border-t border-white/5 h-20 flex justify-around items-center z-40">
        <button onclick="location.reload()" class="flex flex-col items-center gap-1 text-red-600"><i data-lucide="flame"></i><span class="text-[10px] font-black">ROOT</span></button>
        <button class="flex flex-col items-center gap-1 text-zinc-600"><i data-lucide="ghost"></i><span class="text-[10px] font-bold">GHOST</span></button>
        <button class="flex flex-col items-center gap-1 text-zinc-600"><i data-lucide="skull"></i><span class="text-[10px] font-bold">VOID</span></button>
    </nav>

    <audio id="audio-engine"></audio>

    <script>
        const audio = document.getElementById('audio-engine');
        const grid = document.getElementById('song-grid');

        // BYPASS ENGINE V3
        async function darkSearch(query) {
            if(!query) return;
            grid.innerHTML = '<div class="col-span-2 text-center py-20 text-red-600 font-black tracking-tighter loading-text">INJECTING BYPASS... 👿</div>';
            
            try {
                // Gunakan endpoint yang lebih stabil
                const response = await fetch(`https://saavn.dev/api/search/songs?query=${encodeURIComponent(query)}`);
                const result = await response.json();
                
                if(result.success && result.data.results.length > 0) {
                    renderSongs(result.data.results);
                    document.getElementById('section-title').innerText = `EXPLOITED: ${query.toUpperCase()} 🤑`;
                } else {
                    throw new Error("Empty");
                }
            } catch (e) {
                grid.innerHTML = `
                    <div class="col-span-2 text-center py-20">
                        <p class="text-red-500 font-black">CONNECTION TIMEOUT! 💀</p>
                        <p class="text-[10px] text-zinc-600 mt-2 italic">SERVER LU LAGI AMPAS, COBA KLIK LAGI!</p>
                        <button onclick="darkSearch('${query}')" class="mt-4 px-6 py-2 bg-red-600 text-[10px] font-bold rounded-full">RE-INJECT</button>
                    </div>`;
            }
        }

        function renderSongs(songs) {
            grid.innerHTML = songs.map(s => {
                const url = s.downloadUrl[s.downloadUrl.length - 1].url;
                const img = s.image[s.image.length - 1].url;
                const name = s.name.replace(/[^a-zA-Z0-9 ]/g, "");
                const artist = s.artists.primary[0].name.replace(/[^a-zA-Z0-9 ]/g, "");

                return `
                    <div onclick="playDark('${url}', '${name}', '${artist}', '${img}')" 
                         class="song-card">
                        <img src="${img}" class="w-full aspect-square object-cover rounded-xl mb-3 shadow-lg">
                        <div class="text-[11px] font-black truncate text-zinc-100">${s.name}</div>
                        <div class="text-[9px] text-red-600 truncate mt-1 uppercase font-bold">${artist}</div>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        function playDark(url, title, artist, img) {
            document.getElementById('player-bar').style.transform = "translateY(0)";
            document.getElementById('p-title').innerText = title;
            document.getElementById('p-artist').innerText = artist;
            document.getElementById('p-img').src = img;
            
            audio.src = url;
            audio.play();
            updateIcon(true);
        }

        function togglePlay() {
            if(!audio.src) return;
            audio.paused ? audio.play() : audio.pause();
            updateIcon(!audio.paused);
        }

        function updateIcon(playing) {
            document.getElementById('p-icon').setAttribute('data-lucide', playing ? 'pause' : 'play');
            lucide.createIcons();
        }

        audio.ontimeupdate = () => {
            document.getElementById('p-progress').style.width = ((audio.currentTime / audio.duration) * 100 || 0) + '%';
        };

        // AUTO INITIALIZE
        window.onload = () => {
            darkSearch("Bernadya");
            lucide.createIcons();
        };
    </script>
</body>
</html>
