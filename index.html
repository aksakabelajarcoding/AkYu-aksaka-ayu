<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Darkify Full Duration - Ultra Gacor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        .spotify-gradient { background: linear-gradient(to bottom, #1e1e1e, #000); }
        .active-nav { color: #1db954 !important; }
        #main-scroll { height: calc(100vh - 150px); overflow-y: auto; scroll-behavior: smooth; }
        .song-card:active { scale: 0.95; background: #222; }
        ::-webkit-scrollbar { width: 0px; }
        .glow-green { box-shadow: 0 0 20px rgba(29, 185, 84, 0.5); }
    </style>
</head>
<body class="h-screen flex flex-col">

    <main id="main-scroll" class="flex-1 spotify-gradient p-5">
        <header class="flex justify-between items-center mb-6 pt-2">
            <h1 class="text-2xl font-black italic tracking-tighter">DARKIFY <span class="text-green-500">FULL</span></h1>
            <div class="text-[10px] bg-green-500 text-black px-2 py-1 rounded font-bold">FULL DURATION ACTIVE</div>
        </header>

        <div class="relative mb-8">
            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-400 w-5 h-5"></i>
            <input type="text" id="search-input" onkeydown="if(event.key==='Enter') searchFullMusic(this.value)" placeholder="Cari Lagu Full (Enter)..." 
                   class="w-full bg-zinc-900 border-none text-white py-4 pl-12 pr-4 rounded-2xl font-bold outline-none focus:ring-2 focus:ring-green-500 transition-all shadow-2xl">
        </div>

        <h2 id="section-title" class="text-xl font-bold mb-5 flex items-center gap-2">Trending Full Mix 🚀</h2>
        
        <div id="song-grid" class="grid grid-cols-2 gap-4 pb-32">
            <div class="col-span-2 text-center py-20 text-zinc-500 italic">Lagi nyolong data YouTube... 💀</div>
        </div>
    </main>

    <div id="player-bar" class="fixed bottom-20 left-2 right-2 bg-zinc-900 border border-zinc-800 rounded-3xl p-3 flex items-center justify-between shadow-2xl z-50 transform translate-y-40 transition-all duration-500">
        <div class="flex items-center gap-3 truncate max-w-[60%]">
            <img id="p-img" src="" class="w-12 h-12 rounded-2xl object-cover glow-green">
            <div class="truncate">
                <div id="p-title" class="text-sm font-bold truncate">Judul Lagu</div>
                <div id="p-artist" class="text-[10px] text-zinc-500 truncate uppercase">YouTube Audio</div>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="togglePlay()" class="bg-white p-3 rounded-full text-black shadow-lg hover:scale-110 active:scale-90 transition">
                <i id="p-icon" data-lucide="play" class="w-6 h-6 fill-current"></i>
            </button>
        </div>
        <div id="p-progress" class="absolute bottom-0 left-0 h-1 bg-green-500 rounded-full transition-all" style="width: 0%"></div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-black border-t border-zinc-900 h-16 flex justify-around items-center z-40">
        <button onclick="location.reload()" class="flex flex-col items-center gap-1 active-nav"><i data-lucide="flame"></i><span class="text-[10px] font-bold">Home</span></button>
        <button onclick="document.getElementById('search-input').focus()" class="flex flex-col items-center gap-1 text-zinc-500"><i data-lucide="search"></i><span class="text-[10px] font-medium">Search</span></button>
        <button class="flex flex-col items-center gap-1 text-zinc-500"><i data-lucide="library"></i><span class="text-[10px] font-medium">Library</span></button>
    </nav>

    <div id="yt-player" class="hidden"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        let isPlaying = false;
        const grid = document.getElementById('song-grid');

        // 1. INIT YOUTUBE API
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '0', width: '0',
                events: { 'onStateChange': onPlayerStateChange }
            });
            autoTrending();
        }

        // 2. SEARCH FULL DURATION (YOUTUBE DATA)
        async function searchFullMusic(query) {
            if(!query) return;
            grid.innerHTML = '<div class="col-span-2 text-center py-20">Mencari di YouTube... 🚀</div>';
            
            try {
                // Gunakan Proxy untuk mencari data Youtube tanpa API KEY ribet
                const res = await fetch(`https://pipedapi.kavin.rocks/search?q=${encodeURIComponent(query)}&filter=music_videos`);
                const data = await res.json();
                renderSongs(data.content);
            } catch (e) {
                grid.innerHTML = '<div class="col-span-2 text-center text-red-500">Koneksi YouTube Lemot, Coba Lagi, Anj! 💀</div>';
            }
        }

        // 3. RENDER RESULTS
        function renderSongs(songs) {
            grid.innerHTML = songs.map(s => `
                <div onclick="playFull('${s.url.split('v=')[1]}', '${s.title.replace(/'/g, "")}', '${s.uploaderName.replace(/'/g, "")}', '${s.thumbnail}')" 
                     class="song-card p-3 rounded-3xl border border-zinc-800 shadow-lg">
                    <img src="${s.thumbnail}" class="w-full aspect-square object-cover rounded-2xl mb-3">
                    <div class="text-sm font-bold truncate text-white">${s.title}</div>
                    <div class="text-[10px] text-zinc-500 truncate uppercase mt-1">${s.uploaderName}</div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // 4. PLAY ENGINE (FULL)
        function playFull(id, title, artist, img) {
            document.getElementById('player-bar').style.transform = "translateY(0)";
            document.getElementById('p-title').innerText = title;
            document.getElementById('p-artist').innerText = artist;
            document.getElementById('p-img').src = img;
            
            player.loadVideoById(id);
            player.playVideo();
            updateIcon(true);
        }

        function togglePlay() {
            if(isPlaying) { player.pauseVideo(); updateIcon(false); }
            else { player.playVideo(); updateIcon(true); }
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                isPlaying = true; updateIcon(true);
                updateProgress();
            } else { isPlaying = false; updateIcon(false); }
        }

        function updateIcon(playing) {
            const icon = document.getElementById('p-icon');
            icon.setAttribute('data-lucide', playing ? 'pause' : 'play');
            lucide.createIcons();
        }

        function updateProgress() {
            setInterval(() => {
                if(player && isPlaying) {
                    const p = (player.getCurrentTime() / player.getDuration()) * 100;
                    document.getElementById('p-progress').style.width = p + '%';
                }
            }, 1000);
        }

        function autoTrending() { searchFullMusic("Bernadya Full Album 2026"); }
        lucide.createIcons();
    </script>
</body>
</html>
