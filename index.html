<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AKYU - Full Duration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        .spotify-gradient { background: linear-gradient(to bottom, #1a1a1a, #000); }
        #main-scroll { height: calc(100vh - 150px); overflow-y: auto; scroll-behavior: smooth; }
        .song-card { background: #121212; transition: 0.3s; border-radius: 12px; padding: 10px; border: 1px solid #282828; }
        .song-card:active { scale: 0.95; background: #282828; }
        ::-webkit-scrollbar { width: 0px; }
        .glow-green { box-shadow: 0 0 15px rgba(29, 185, 84, 0.4); }
    </style>
</head>
<body class="h-screen flex flex-col">

    <main id="main-scroll" class="flex-1 spotify-gradient p-5">
        <header class="flex justify-between items-center mb-6 pt-2">
            <div>
                <h1 class="text-2xl font-black text-white italic">DARKIFY <span class="text-green-500 text-sm">ILLEGAL</span></h1>
                <p class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest">Full Duration Mode Active 🔓</p>
            </div>
            <div class="bg-red-500/10 p-2 rounded-full border border-red-500/20"><i data-lucide="skull" class="w-5 h-5 text-red-500"></i></div>
        </header>

        <div class="relative mb-8">
            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-400 w-5 h-5"></i>
            <input type="text" id="search-input" onkeydown="if(event.key==='Enter') illegalSearch(this.value)" placeholder="Cari Artis (Contoh: Bernadya) - Enter" 
                   class="w-full bg-zinc-900 border-none text-white py-4 pl-12 pr-4 rounded-xl font-bold outline-none focus:ring-2 focus:ring-red-600 transition-all shadow-2xl">
        </div>

        <h2 id="section-title" class="text-xl font-bold mb-5 flex items-center gap-2">Global Bypass List 🌎</h2>
        <div id="song-grid" class="grid grid-cols-2 gap-4 pb-28">
            <div class="col-span-2 text-center py-20 text-zinc-600 italic">Ketik nama artis trus tekan Enter... 💀</div>
        </div>
    </main>

    <div id="player-bar" class="fixed bottom-20 left-2 right-2 bg-zinc-900 border border-zinc-800 rounded-3xl p-3 flex items-center justify-between shadow-2xl z-50 transform translate-y-40 transition-all duration-500">
        <div class="flex items-center gap-3 truncate max-w-[65%]">
            <img id="p-img" src="" class="w-12 h-12 rounded-xl object-cover glow-green">
            <div class="truncate">
                <div id="p-title" class="text-sm font-bold truncate">Pilih Lagu</div>
                <div id="p-artist" class="text-[10px] text-zinc-400 truncate uppercase font-black">Streaming Full...</div>
            </div>
        </div>
        <button onclick="togglePlay()" class="bg-green-500 p-3 rounded-full text-black hover:scale-110 active:scale-90 transition">
            <i id="p-icon" data-lucide="play" class="w-6 h-6 fill-current"></i>
        </button>
        <div class="absolute bottom-0 left-0 h-1 bg-green-500 rounded-full transition-all" id="p-progress" style="width: 0%"></div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/95 border-t border-zinc-900 h-16 flex justify-around items-center z-40">
        <button onclick="location.reload()" class="flex flex-col items-center gap-1 text-green-500"><i data-lucide="zap"></i><span class="text-[10px] font-bold">Bypass</span></button>
        <button onclick="document.getElementById('search-input').focus()" class="flex flex-col items-center gap-1 text-zinc-500"><i data-lucide="search"></i><span class="text-[10px] font-medium">Search</span></button>
        <button class="flex flex-col items-center gap-1 text-zinc-500"><i data-lucide="unlock"></i><span class="text-[10px] font-medium">Premium</span></button>
    </nav>

    <audio id="audio-engine"></audio>

    <script>
        const audio = document.getElementById('audio-engine');
        const grid = document.getElementById('song-grid');

        // BYPASS SEARCH (SAAVN ENGINE)
        async function illegalSearch(query) {
            if(!query) return;
            grid.innerHTML = '<div class="col-span-2 text-center py-20 text-red-500 animate-pulse">Menjebol Enkripsi Database... 😈</div>';
            
            try {
                // API Ilegal/Alternatif yang memberikan durasi FULL
                const res = await fetch(`https://saavn.me/search/songs?query=${encodeURIComponent(query)}`);
                const data = await res.json();
                
                if(data.status === "SUCCESS") {
                    renderSongs(data.data.results);
                    document.getElementById('section-title').innerText = `Artis: ${query} (Unlocked) 🤑`;
                } else { throw new Error(); }
            } catch (e) {
                grid.innerHTML = '<div class="col-span-2 text-center text-red-500 uppercase font-black">Server Sibuk! Coba Artis Lain, Mek! 💀</div>';
            }
        }

        function renderSongs(songs) {
            grid.innerHTML = songs.map(s => `
                <div onclick="playIllegal('${s.downloadUrl[4].link}', '${s.name.replace(/'/g, "")}', '${s.primaryArtists.replace(/'/g, "")}', '${s.image[2].link}')" 
                     class="song-card">
                    <img src="${s.image[2].link}" class="w-full aspect-square object-cover rounded-lg mb-3 shadow-2xl">
                    <div class="text-sm font-bold truncate text-white">${s.name}</div>
                    <div class="text-[10px] text-zinc-500 truncate mt-1 uppercase">${s.primaryArtists}</div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function playIllegal(url, title, artist, img) {
            document.getElementById('player-bar').style.transform = "translateY(0)";
            document.getElementById('p-title').innerText = title;
            document.getElementById('p-artist').innerText = artist;
            document.getElementById('p-img').src = img;
            
            audio.src = url;
            audio.play();
            updateIcon(true);
        }

        function togglePlay() {
            if(!audio.src) return;
            audio.paused ? audio.play() : audio.pause();
            updateIcon(!audio.paused);
        }

        function updateIcon(playing) {
            document.getElementById('p-icon').setAttribute('data-lucide', playing ? 'pause' : 'play');
            lucide.createIcons();
        }

        audio.ontimeupdate = () => {
            document.getElementById('p-progress').style.width = ((audio.currentTime / audio.duration) * 100 || 0) + '%';
        };

        // AUTO START
        illegalSearch("Trending Indonesia");
        lucide.createIcons();
    </script>
</body>
</html>
